name: Go CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: root
          POSTGRES_DB: root
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U root -d root"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      HOST: localhost
      DBPORT: "5432"
      USER: root
      PASSWORD: root
      DBNAME: root
      GIN_MODE: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download modules
        run: go mod download

      - name: Check go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: go test -race -shuffle=on -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.run_id }}
          path: coverage.out
          if-no-files-found: error

  govulncheck:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  docker-build:
    name: Docker Build
    needs:
      - test
      - govulncheck
    if: github.event_name == 'pull_request' || github.ref != 'refs/heads/main'
    uses: ./.github/workflows/Docker.yml
    with:
      push: false
    secrets: inherit

  docker-publish:
    name: Docker Publish
    needs:
      - test
      - govulncheck
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/Docker.yml
    with:
      push: true
    secrets: inherit

  compose-artifact:
    name: Compose Artifact
    needs: docker-publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Upload docker-compose.yml
        uses: actions/upload-artifact@v7
        with:
          name: programa-${{ github.run_id }}
          path: docker-compose.yml
          if-no-files-found: error

  deploy-ec2:
    name: Deploy EC2
    needs:
      - docker-publish
      - compose-artifact
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/EC2.yml
    secrets: inherit

  # ECS is kept as an optional deployment target.
  # deploy-ecs:
  #   name: Deploy ECS
  #   needs: docker-publish
  #   if: github.event_name == 'push' && github.ref == 'refs/heads/main'
  #   uses: ./.github/workflows/ECS.yml
  #   secrets: inherit
