name: Docker

on:
  workflow_call:
    inputs:
      push:
        description: Push images to Docker Hub
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: lucianobrum/go_ci
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.run_number }},enable=${{ inputs.push }}
            type=raw,value=ci-${{ github.sha }},enable=${{ !inputs.push }}
            type=sha,prefix=sha-

      - name: Docker Login
        if: inputs.push
        uses: docker/login-action@v3
        with:
          username: lucianobrum
          password: ${{ secrets.PWD_DOCKER_HUB }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ inputs.push }}
          load: ${{ !inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image
        if: ${{ !inputs.push }}
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: lucianobrum/go_ci:ci-${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
