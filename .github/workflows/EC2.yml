name: Entrega contínua

on:
  workflow_call:

permissions:
  contents: read

jobs:
  EC2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download docker-compose.yml
        uses: actions/download-artifact@v8
        with:
          name: programa-${{ github.run_id }}

      - name: Prepare remote directory
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          script: |
            mkdir -p /home/${{ secrets.REMOTE_USER }}/apigo
            cd /home/${{ secrets.REMOTE_USER }}/apigo
            if [ -f docker-compose.yml ]; then
              sudo docker compose down --remove-orphans
            fi

      - name: Copy docker-compose.yml
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.yml
          target: /home/${{ secrets.REMOTE_USER }}/apigo
          overwrite: true

      - name: Start remote containers
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          script: |
            export IMAGE_TAG=${{ github.run_number }}
            export HOST=${{ secrets.DBHOST }}
            export DBUSER=${{ secrets.DBUSER }}
            export DBPASSWORD=${{ secrets.DBPASSWORD }}
            export DBNAME=${{ secrets.DBNAME }}
            export DBPORT=${{ secrets.DBPORT }}
            export API_PORT=${{ vars.API_PORT || '8085' }}
            export POSTGRES_PORT=${{ vars.POSTGRES_PORT || '5433' }}
            cd /home/${{ secrets.REMOTE_USER }}/apigo
            sudo --preserve-env=IMAGE_TAG,HOST,DBUSER,DBPASSWORD,DBNAME,DBPORT,API_PORT,POSTGRES_PORT docker compose pull go-ci
            sudo --preserve-env=IMAGE_TAG,HOST,DBUSER,DBPASSWORD,DBNAME,DBPORT,API_PORT,POSTGRES_PORT docker compose up -d --no-build
            sudo docker compose ps
